        version_spec: "3.8.4"
        install_order: 2
      - name: pandas
        version_spec: "2.2.2"
        install_order: 3

  - slug: yolov8
    name: "YOLOv8"
    description: >
      Ultralytics YOLOv8 object detection environment. Includes PyTorch,
      OpenCV, and all Ultralytics dependencies. CUDA optional but recommended.
    tags: [computer-vision, object-detection, yolo, gpu]
    os_support: [LINUX, WSL, WIN]
    cuda_required: false
    python_versions: ["3.10", "3.11", "3.12"]
    cuda_versions: ["11.8", "12.1"]
    status: ACTIVE
