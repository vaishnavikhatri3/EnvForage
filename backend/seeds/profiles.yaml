profiles:
  - slug: pytorch-cuda
    name: "PyTorch CUDA"
    description: >
      Full PyTorch GPU environment with CUDA support. Ideal for deep learning
      model training and inference on NVIDIA GPUs.
    tags: [deep-learning, gpu, cuda, pytorch]
    os_support: [LINUX, WSL]
    cuda_required: true
    python_versions: ["3.10", "3.11", "3.12", "3.13"]
    cuda_versions: ["11.8", "12.1"]
    status: ACTIVE
    last_validated: "2026-05-24"
    packages:
      - name: torch
        version_spec: "2.5.0"
        cuda_variant: "cu118"
        install_order: 0
      - name: torchvision
        version_spec: "0.20.0"
        cuda_variant: "cu118"
        install_order: 1
      - name: torchaudio
        version_spec: "2.5.0"
        cuda_variant: "cu118"
        install_order: 2
      - name: numpy
        version_spec: "1.26.4"
        install_order: 3
      - name: matplotlib
        version_spec: "3.8.4"
        install_order: 4
      - name: scipy
        version_spec: "1.13.0"
        install_order: 5

  - slug: tf-gpu
    name: "TensorFlow GPU"
    description: >
      TensorFlow with GPU acceleration via CUDA. Supports TF 2.13–2.16.
      Note: TF 2.11+ requires WSL2 on Windows for GPU support.
    tags: [deep-learning, gpu, cuda, tensorflow]
    os_support: [LINUX, WSL]
    cuda_required: true
    python_versions: ["3.10", "3.11", "3.12", "3.13"]
    cuda_versions: ["11.8", "12.1"]
