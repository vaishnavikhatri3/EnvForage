services:
  db:
    image: postgres:16-alpine
    container_name: envforge_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: envforge_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  llm:
    image: ollama/ollama
    container_name: envforge_ollama_prod
    restart: always
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: envforge_api_prod
    restart: always

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm:
        condition: service_started

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENVFORGE_LLM_PROVIDER: ${ENVFORGE_LLM_PROVIDER}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      RATE_LIMIT_AI_RPM: ${RATE_LIMIT_AI_RPM:-10}
      RATE_LIMIT_REPAIR_RPM: ${RATE_LIMIT_REPAIR_RPM:-20}
      RATE_LIMIT_GENERAL_RPM: ${RATE_LIMIT_GENERAL_RPM:-60}
      OLLAMA_HOST: http://llm:11434

    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.services.seed_service &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
        - BACKEND_API_URL=${BACKEND_API_URL:-http://api:8000}
    container_name: envforge_frontend_prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  ollama_data:
