version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: envforge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: envforge
      POSTGRES_PASSWORD: envforge_dev_secret
      POSTGRES_DB: envforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envforge -d envforge"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  redis:
    image: redis:7-alpine
    container_name: envforge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: envforge_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://envforge:envforge_dev_secret@db:5432/envforge
      ENVIRONMENT: development
      DEBUG: "true"
      SECRET_KEY: dev_secret_key_change_in_production
      ENVFORGE_LLM_PROVIDER: mock
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.services.seed_service &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
