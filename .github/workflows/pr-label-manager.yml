name: PR Label & Quality Manager

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created, edited, deleted]
  check_suite:
    types: [completed]
  check_run:
    types: [completed]

permissions:
  pull-requests: write
  issues: write
  checks: read
  statuses: read

jobs:
  label-manager:
    name: Manage PR Labels
    runs-on: ubuntu-latest
    steps:
      - name: Run Label Manager Engine
        uses: actions/github-script@v7
        with:
          script: |
            // --- CONSTANTS & CONFIGURATION ---
            const PROGRAM_REGEX = /^(gssoc|ssoc|nsoc)/i;
            
            const DIFFICULTY_LABELS = ['level1', 'level2', 'level3'];
            const EFFORT_LABELS = ['easy', 'medium', 'hard'];
            const TYPE_LABELS = [
              'type:bug',
              'type:feature',
              'type:docs',
              'type:testing',
              'type:performance',
              'type:security',
              'type:design',
              'type:refactor'
            ];
            const DIFFICULTY2_LABELS = [
              'level:critical',
              'level:beginner',
              'level:intermediate',
              'level:advanced'
            ];
            
            const STICKY_SIGNATURE = '<!-- PR-LABEL-MANAGER-STICKY-COMMENT -->';

            // --- FORK-SAFETY HELPER WRAPPER ---
            async function safeGithubCall(apiCall) {
              try {
                return await apiCall();
              } catch (err) {
                if (err.status === 403 || err.status === 401 || err.message.toLowerCase().includes('resource not accessible by integration')) {
                  console.warn(`[Fork / Permission Warning] API call failed due to permissions: ${err.message}`);
                  return null;
                }
                throw err;
              }
            }

            // --- 1. RESOLVE PULL REQUEST NUMBER ---
            if (context.eventName === 'issue_comment' && !context.payload.issue.pull_request) {
              console.log('Comment is not on a pull request. Exiting early.');
              return;
            }

            let prNumber = null;
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.issue && context.payload.issue.pull_request) {
              prNumber = context.payload.issue.number;
            } else {
              const prs = (context.payload.check_suite && context.payload.check_suite.pull_requests) ||
                          (context.payload.check_run && context.payload.check_run.pull_requests) ||
                          (context.payload.check_run && context.payload.check_run.check_suite && context.payload.check_run.check_suite.pull_requests);
              if (prs && prs.length > 0) {
                prNumber = prs[0].number;
              }
            }

            // Fallback: Resolve PR from commit SHA
            if (!prNumber) {
              const sha = context.payload.after || 
                          (context.payload.check_suite && context.payload.check_suite.head_sha) || 
                          (context.payload.check_run && context.payload.check_run.head_sha) || 
                          context.sha;
              if (sha) {
                console.log(`PR number not found in payload. Resolving via commit SHA: ${sha}`);
                try {
                  const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    commit_sha: sha
                  });
                  if (prs && prs.length > 0) {
                    prNumber = prs[0].number;
                    console.log(`Resolved associated PR: #${prNumber}`);
                  }
                } catch (err) {
                  console.log(`Failed to list associated PRs for commit SHA: ${err.message}`);
                }
              }
            }

            if (!prNumber) {
              console.log('Could not resolve pull request number. Exiting execution.');
              return;
            }

            // --- 2. FETCH DETAILED PR METADATA WITH RETRY ---
            let pr = null;
            const maxRetries = 3;
            for (let i = 0; i < maxRetries; i++) {
              const response = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              pr = response.data;
              if (pr.mergeable !== null) {
                break;
              }
              console.log(`PR mergeability is currently null (calculating). Waiting 3 seconds (Attempt ${i + 1}/${maxRetries})...`);
              await new Promise(resolve => setTimeout(resolve, 3000));
            }

            const currentLabels = pr.labels.map(l => l.name);
            const labelsToAdd = [];
            const labelsToRemove = [];

            // --- 3. MANDATORY LABEL ENFORCEMENT & CONFLICT CHECKS ---
            const foundPrograms = currentLabels.filter(l => PROGRAM_REGEX.test(l));
            const foundDifficulty = currentLabels.filter(l => DIFFICULTY_LABELS.includes(l));
            const foundEffort = currentLabels.filter(l => EFFORT_LABELS.includes(l));
            const foundTypes = currentLabels.filter(l => TYPE_LABELS.includes(l));
            const foundDifficulty2 = currentLabels.filter(l => DIFFICULTY2_LABELS.includes(l));

            const missingCategories = [];

            // Program labels validation
            if (foundPrograms.length === 0) {
              missingCategories.push('Program label (e.g. `gssoc:approved`, `SSoC26`, `NSoC\'26`)');
            }

            // Difficulty labels validation (Exclusivity: only ONE allowed)
            if (foundDifficulty.length === 0) {
              missingCategories.push('Difficulty label (e.g. `level1`, `level2`, `level3`)');
            } else if (foundDifficulty.length > 1) {
              const keep = foundDifficulty[0];
              const remove = foundDifficulty.slice(1);
              labelsToRemove.push(...remove);
              console.log(`Difficulty violation: Keeping '${keep}', removing: ${remove.join(', ')}`);
            }

            // Effort labels validation (Exclusivity: only ONE allowed)
            if (foundEffort.length === 0) {
              missingCategories.push('Effort label (e.g. `easy`, `medium`, `hard`)');
            } else if (foundEffort.length > 1) {
              const keep = foundEffort[0];
              const remove = foundEffort.slice(1);
              labelsToRemove.push(...remove);
              console.log(`Effort violation: Keeping '${keep}', removing: ${remove.join(', ')}`);
            }

            // Type labels validation
            if (foundTypes.length === 0) {
              missingCategories.push('Type label (e.g. `type:bug`, `type:feature`, `type:docs`, etc.)');
            }

            // Difficulty2 labels validation (Exclusivity: only ONE allowed)
            if (foundDifficulty2.length === 0) {
              missingCategories.push('Difficulty2 label (e.g. `level:critical`, `level:beginner`, `level:intermediate`, `level:advanced`)');
            } else if (foundDifficulty2.length > 1) {
              const keep = foundDifficulty2[0];
              const remove = foundDifficulty2.slice(1);
              labelsToRemove.push(...remove);
              console.log(`Difficulty2 violation: Keeping '${keep}', removing: ${remove.join(', ')}`);
            }

            // --- 4. MERGEABILITY & CONFLICT DETECTION ---
            const hasMergeConflicts = pr.mergeable === false || pr.mergeable_state === 'dirty';
            if (hasMergeConflicts) {
              if (!currentLabels.includes('merge-conflict')) labelsToAdd.push('merge-conflict');
              if (currentLabels.includes('can-be-merged')) labelsToRemove.push('can-be-merged');
            } else {
              if (currentLabels.includes('merge-conflict')) labelsToRemove.push('merge-conflict');
            }

            // --- 5. CI / CHECK STATUS DETECTION ---
            let failedChecks = [];
            const headSha = pr.head.sha;

            // Retrieve check runs
            try {
              const checkRunsResponse = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha
              });
              for (const run of checkRunsResponse.data.check_runs) {
                const runName = run.name.toLowerCase();
                // Filter out self-running jobs to avoid circular dependencies
                if (runName.includes('watchdog') || runName.includes('label-manager')) {
                  continue;
                }
                if (run.status === 'completed' && ['failure', 'timed_out', 'action_required'].includes(run.conclusion)) {
                  failedChecks.push({ name: run.name, url: run.html_url || '#' });
                }
              }
            } catch (err) {
              console.log(`Warning: Failed to retrieve check runs: ${err.message}`);
            }

            // Retrieve commit status combinations
            try {
              const statusResponse = await github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha
              });
              for (const status of statusResponse.data.statuses) {
                const contextName = status.context.toLowerCase();
                if (contextName.includes('watchdog') || contextName.includes('label-manager')) {
                  continue;
                }
                if (['failure', 'error'].includes(status.state)) {
                  failedChecks.push({ name: status.context, url: status.target_url || '#' });
                }
              }
            } catch (err) {
              console.log(`Warning: Failed to retrieve combined statuses: ${err.message}`);
            }

            const hasFailingChecks = failedChecks.length > 0;
            if (hasFailingChecks) {
              if (!currentLabels.includes('failing-checks')) labelsToAdd.push('failing-checks');
              if (currentLabels.includes('can-be-merged')) labelsToRemove.push('can-be-merged');
            } else {
              if (currentLabels.includes('failing-checks')) labelsToRemove.push('failing-checks');
            }

            // --- 6. REVIEW STATE & REQUESTED REVIEWERS DETECTION ---
            let reviews = [];
            try {
              const res = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100
              });
              reviews = res.data;
            } catch (err) {
              console.log(`Warning: Failed to fetch reviews: ${err.message}`);
            }

            // Group reviews by user to determine the latest review state for each reviewer
            const latestReviewsByUser = {};
            for (const review of reviews) {
              if (review.user) {
                latestReviewsByUser[review.user.login] = review.state;
              }
            }

            const activeReviewStates = Object.values(latestReviewsByUser);
            const hasChangesRequested = activeReviewStates.includes('CHANGES_REQUESTED');
            const hasApprovals = activeReviewStates.includes('APPROVED');

            if (hasChangesRequested) {
              if (!currentLabels.includes('changes-requested')) labelsToAdd.push('changes-requested');
              if (currentLabels.includes('can-be-merged')) labelsToRemove.push('can-be-merged');
            } else {
              if (currentLabels.includes('changes-requested')) labelsToRemove.push('changes-requested');
              
              // Approve ready-to-merge when approvals exist, and no blocks (conflicts/failing checks) are present
              if (hasApprovals && !hasMergeConflicts && !hasFailingChecks) {
                if (!currentLabels.includes('can-be-merged')) labelsToAdd.push('can-be-merged');
              } else {
                if (currentLabels.includes('can-be-merged')) labelsToRemove.push('can-be-merged');
              }
            }

            // Manage review-requested label
            const pendingReviewCount = pr.requested_reviewers.length + pr.requested_teams.length;
            if (pendingReviewCount > 0) {
              if (!currentLabels.includes('review-requested')) labelsToAdd.push('review-requested');
            } else {
              if (currentLabels.includes('review-requested')) labelsToRemove.push('review-requested');
            }

            // Manage ready-for-review/draft states
            if (pr.draft) {
              if (currentLabels.includes('ready-for-review')) labelsToRemove.push('ready-for-review');
            } else {
              if (!currentLabels.includes('ready-for-review')) labelsToAdd.push('ready-for-review');
            }

            // --- 7. AI & CRITICAL REVIEW PARSING (CodeRabbit, Copilot, GitHub Reviews) ---
            const reviewsToParse = [];

            // Add latest review bodies
            const latestReviewObjByUser = {};
            for (const r of reviews) {
              if (r.user) {
                latestReviewObjByUser[r.user.login] = r;
              }
            }

            for (const reviewer in latestReviewObjByUser) {
              const r = latestReviewObjByUser[reviewer];
              // If reviewer's latest state is APPROVED, skip parsing their older bodies
              if (r.state === 'APPROVED') {
                continue;
              }
              if (r.body) {
                reviewsToParse.push({
                  body: r.body,
                  author: reviewer,
                  url: r.html_url,
                  type: 'Review Body'
                });
              }
            }

            // Fetch and parse inline review comments
            let reviewComments = [];
            try {
              const res = await github.rest.pulls.listReviewComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100
              });
              reviewComments = res.data;
            } catch (err) {
              console.log(`Warning: Failed to fetch review comments: ${err.message}`);
            }

            for (const rc of reviewComments) {
              // Ignore outdated review comments (position is null)
              if (rc.position === null) {
                continue;
              }
              if (rc.body) {
                reviewsToParse.push({
                  body: rc.body,
                  author: rc.user ? rc.user.login : 'unknown',
                  url: rc.html_url,
                  type: 'Review Comment'
                });
              }
            }

            // Fetch and parse general issue comments
            let issueComments = [];
            try {
              const res = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100
              });
              issueComments = res.data;
            } catch (err) {
              console.log(`Warning: Failed to fetch issue comments: ${err.message}`);
            }

            for (const ic of issueComments) {
              const body = ic.body || '';
              // Skip the bot's own sticky comments
              if (body && !body.includes(STICKY_SIGNATURE) && !body.includes('<!-- PR-WATCHDOG-STICKY-COMMENT -->')) {
                reviewsToParse.push({
                  body: body,
                  author: ic.user ? ic.user.login : 'unknown',
                  url: ic.html_url,
                  type: 'General Comment'
                });
              }
            }

            // Group parsed comments into findings
            const activeReviewFindings = { critical: [], high: [], medium: [] };
            let hasCodeRabbitFeedback = false;
            let hasCopilotFeedback = false;

            for (const item of reviewsToParse) {
              const authorLower = item.author.toLowerCase();
              if (authorLower === 'github-actions[bot]') {
                continue;
              }

              const isCR = authorLower.includes('coderabbit') || item.body.toLowerCase().includes('coderabbit');
              const isCP = authorLower.includes('copilot') || item.body.toLowerCase().includes('copilot');

              if (isCR) hasCodeRabbitFeedback = true;
              if (isCP) hasCopilotFeedback = true;

              const lines = item.body.split('\n');
              for (const line of lines) {
                const lineLower = line.toLowerCase();
                let severity = null;

                if (/\b(critical|severity:\s*critical)\b/i.test(lineLower)) {
                  severity = 'critical';
                } else if (/\b(high|severity:\s*high)\b/i.test(lineLower)) {
                  severity = 'high';
                } else if (/\b(medium|severity:\s*medium)\b/i.test(lineLower)) {
                  severity = 'medium';
                }

                if (severity) {
                  activeReviewFindings[severity].push({
                    author: item.author,
                    type: item.type,
                    snippet: line.trim().substring(0, 120),
                    url: item.url,
                    isCR,
                    isCP
                  });
                }
              }
            }

            const totalFindingsCount = activeReviewFindings.critical.length + activeReviewFindings.high.length + activeReviewFindings.medium.length;
            console.log(`Active review findings: ${totalFindingsCount} (Critical: ${activeReviewFindings.critical.length}, High: ${activeReviewFindings.high.length}, Medium: ${activeReviewFindings.medium.length})`);

            if (totalFindingsCount > 0) {
              if (!currentLabels.includes('needs-review-fixes')) labelsToAdd.push('needs-review-fixes');
            } else {
              if (currentLabels.includes('needs-review-fixes')) labelsToRemove.push('needs-review-fixes');
            }

            // --- 8. BUILD AND UPDATE CONSOLIDATED STICKY COMMENT ---
            const hasLabelIssues = missingCategories.length > 0;
            const hasPRIssues = hasLabelIssues || hasMergeConflicts || hasFailingChecks || totalFindingsCount > 0;

            let commentBody = `${STICKY_SIGNATURE}\n\n`;

            if (!hasPRIssues) {
              commentBody += `## 🎉 PR Label & Quality Watchdog: All Checks Passed!

Hi @${pr.user.login}, 

Great job! All required labels have been applied and all quality checks have passed.

* **Mandatory Labels:** ✅ All categories present and validated
* **Merge Conflicts:** ✅ No conflicts detected
* **CI / Build Checks:** ✅ All checks passed
* **Review Feedback:** ✅ No active critical, high, or medium severity concerns identified

${hasCodeRabbitFeedback ? '*🤖 CodeRabbit review feedback was analyzed.*\n' : ''}${hasCopilotFeedback ? '*🤖 GitHub Copilot comments were analyzed.*\n' : ''}
---
*Last updated: ${new Date().toUTCString()}*`;
            } else {
              commentBody += `## 🔍 PR Label & Quality Watchdog Report

Hi @${pr.user.login},

We detected some items on this Pull Request that require attention before it can be merged:

`;

              // Required label enforcement reporting
              if (hasLabelIssues) {
                commentBody += `### ⚠️ Missing Required Labels
Please ensure this PR has at least one label from each missing category:
`;
                for (const cat of missingCategories) {
                  commentBody += `- [ ] **Missing ${cat}**\n`;
                }
                commentBody += `\n`;
              } else {
                commentBody += `### ✅ Required Labels
All mandatory label groups are present: Program, Difficulty, Effort, Type, and Difficulty2.
\n`;
              }

              // Merge conflict reporting
              if (hasMergeConflicts) {
                commentBody += `### ❌ Merge Conflicts
This branch has merge conflicts with the target branch. Please rebase or merge the target branch and resolve the conflicts.
\n`;
              } else {
                commentBody += `### ✅ Merge Conflicts
No conflicts detected.
\n`;
              }

              // CI status reporting
              if (hasFailingChecks) {
                commentBody += `### ❌ Failing CI Checks
The following check runs or commit statuses are failing:
`;
                for (const check of failedChecks) {
                  commentBody += `- [${check.name}](${check.url})\n`;
                }
                commentBody += `\n`;
              } else {
                commentBody += `### ✅ CI Checks
All checks passed.
\n`;
              }

              // Review feedback reporting
              if (totalFindingsCount > 0) {
                commentBody += `### ❌ Review Feedback Findings
The following issues were flagged in reviews:

`;
                if (activeReviewFindings.critical.length > 0) {
                  commentBody += `#### 🔴 Critical Severity Issues\n`;
                  for (const item of activeReviewFindings.critical) {
                    commentBody += `- **@${item.author}** (${item.type}): [${item.snippet}](${item.url}) ${item.isCR ? '🤖 *CodeRabbit*' : ''} ${item.isCP ? '🤖 *Copilot*' : ''}\n`;
                  }
                  commentBody += `\n`;
                }
                
                if (activeReviewFindings.high.length > 0) {
                  commentBody += `#### 🟠 High Severity Issues\n`;
                  for (const item of activeReviewFindings.high) {
                    commentBody += `- **@${item.author}** (${item.type}): [${item.snippet}](${item.url}) ${item.isCR ? '🤖 *CodeRabbit*' : ''} ${item.isCP ? '🤖 *Copilot*' : ''}\n`;
                  }
                  commentBody += `\n`;
                }
                
                if (activeReviewFindings.medium.length > 0) {
                  commentBody += `#### 🟡 Medium Severity Issues\n`;
                  for (const item of activeReviewFindings.medium) {
                    commentBody += `- **@${item.author}** (${item.type}): [${item.snippet}](${item.url}) ${item.isCR ? '🤖 *CodeRabbit*' : ''} ${item.isCP ? '🤖 *Copilot*' : ''}\n`;
                  }
                  commentBody += `\n`;
                }
              } else {
                commentBody += `### ✅ Review Feedback
No critical, high, or medium severity review issues detected.
\n`;
              }

              commentBody += `Please resolve the issues above to proceed.
\n---
*Last updated: ${new Date().toUTCString()}*`;
            }

            // Find existing watchdog comment to create or update
            let issueCommentsList = [];
            try {
              const res = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
              issueCommentsList = res.data;
            } catch (err) {
              console.log(`Warning: Failed to fetch issue comments: ${err.message}`);
            }

            const existingSticky = issueCommentsList.find(c => c.body && c.body.includes(STICKY_SIGNATURE));

            if (existingSticky) {
              console.log(`Updating existing sticky comment (ID: ${existingSticky.id}).`);
              await safeGithubCall(() => github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingSticky.id,
                body: commentBody
              }));
            } else if (hasPRIssues) {
              console.log('Creating new sticky comment.');
              await safeGithubCall(() => github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              }));
            }

            // --- 9. SYNCHRONIZE LABELS BACK TO GITHUB ---
            const uniqueLabelsToAdd = [...new Set(labelsToAdd)].filter(l => !currentLabels.includes(l));
            const uniqueLabelsToRemove = [...new Set(labelsToRemove)].filter(l => currentLabels.includes(l));

            if (uniqueLabelsToAdd.length > 0) {
              console.log(`Sync: Adding labels: ${uniqueLabelsToAdd.join(', ')}`);
              await safeGithubCall(() => github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: uniqueLabelsToAdd
              }));
            }

            for (const label of uniqueLabelsToRemove) {
              console.log(`Sync: Removing label: ${label}`);
              await safeGithubCall(() => github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: label
              }));
            }
            console.log('Execution completed successfully.');
