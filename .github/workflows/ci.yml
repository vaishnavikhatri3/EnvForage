name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -e ".[dev]"
          
      - name: Lint with Ruff
        run: |
          cd backend
          ruff check app/ tests/
          
      - name: Type check with Mypy
        run: |
          cd backend
          mypy app/
          
      - name: Run Pytest
        run: |
          cd backend
          pytest tests/ --cov=app --cov-report=xml
          
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./backend/coverage.xml
          flags: backend

  cli-tests:
    name: CLI Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd cli
          pip install -e ".[dev]"
          
      - name: Run Pytest
        run: |
          cd cli
          pytest tests/

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Build Application
        run: |
          cd frontend
          npm run build
